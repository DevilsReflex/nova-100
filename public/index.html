<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Nova 100 — Asteroid Miner</title>
<style>
  :root { --accent:#5ad1ff; --bg:#05070f; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif; color: #e8f0ff; }
  #game { display: block; position: fixed; inset: 0; cursor: crosshair; }

  /* ---- HUD ---- */
  .hud { position: fixed; pointer-events: none; z-index: 5;
    text-shadow: 0 1px 3px rgba(0,0,0,.8); }
  #stats { top: 14px; left: 16px; font-size: 14px; line-height: 1.5; }
  #stats b { color: var(--accent); }
  #board { top: 14px; right: 16px; width: 220px; background: rgba(8,14,28,.55);
    border: 1px solid rgba(90,209,255,.25); border-radius: 10px; padding: 10px 12px;
    font-size: 13px; backdrop-filter: blur(4px); }
  #board h3 { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 6px; }
  #board .row { display: flex; justify-content: space-between; padding: 1px 0;
    white-space: nowrap; }
  #board .row.me { color: #ffd166; font-weight: 600; }
  #board .bot { opacity: .65; }
  /* cargo hold */
  #cargo { bottom: 16px; left: 16px; max-width: 62vw; display: flex; flex-wrap: wrap;
    gap: 6px 14px; font-size: 13px; }
  #cargo .ci { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  #cargo .ci i { width: 9px; height: 9px; border-radius: 2px; display: inline-block;
    box-shadow: 0 0 6px currentColor; }
  #cargo .ci b { color: #fff; }
  #cargo .empty { opacity: .5; }

  /* start screen */
  #start { position: fixed; inset: 0; display: grid; place-items: center; z-index: 20;
    background: radial-gradient(circle at 50% 35%, #0c1430, #03050c 70%); }
  #start .panel { width: min(440px, 90vw); text-align: center; padding: 36px 32px;
    background: rgba(10,16,34,.7); border: 1px solid rgba(90,209,255,.3);
    border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
  #start h1 { font-size: 44px; letter-spacing: 6px; font-weight: 800;
    background: linear-gradient(90deg,#5ad1ff,#c77dff); -webkit-background-clip: text;
    background-clip: text; color: transparent; }
  #start .sub { opacity: .7; margin: 6px 0 24px; font-size: 14px; letter-spacing: 1px; }
  #start input { width: 100%; padding: 13px 16px; font-size: 16px; border-radius: 10px;
    border: 1px solid rgba(90,209,255,.35); background: rgba(0,0,0,.35); color: #fff;
    outline: none; text-align: center; }
  #start input:focus { border-color: var(--accent); }
  #start button { margin-top: 16px; width: 100%; padding: 14px; font-size: 16px;
    font-weight: 700; letter-spacing: 2px; border: none; border-radius: 10px;
    cursor: pointer; color: #03050c; background: linear-gradient(90deg,#5ad1ff,#06d6a0); }
  #start button:hover { filter: brightness(1.08); }
  #start .controls { margin-top: 22px; font-size: 12.5px; opacity: .65; line-height: 1.7; }
  #start .controls kbd { background: rgba(255,255,255,.12); border-radius: 4px;
    padding: 1px 6px; font-family: inherit; }
  #status { margin-top: 12px; font-size: 12px; min-height: 16px; color: #ffd166; }
  #halloffame { margin-top: 22px; text-align: left;
    border-top: 1px solid rgba(90,209,255,.18); padding-top: 14px; }
  #halloffame h3 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); text-align: center; margin-bottom: 10px; }
  #hofRows { list-style: none; max-height: 170px; overflow-y: auto; padding-right: 4px; }
  #hofRows li { display: flex; justify-content: space-between; gap: 10px;
    font-size: 13px; padding: 3px 6px; border-radius: 5px; }
  #hofRows li:nth-child(odd) { background: rgba(255,255,255,.035); }
  #hofRows li .rank { color: #8aa0c0; width: 24px; flex: none; text-align: right; }
  #hofRows li .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #hofRows li .sc { color: #ffd166; font-variant-numeric: tabular-nums; }
  #hofRows li.muted { justify-content: center; color: #6b7a90; }
  #hofRows li.top1 .nm { color: #ffd166; font-weight: 700; }
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="stats" class="hud"></div>
  <div id="board" class="hud"><h3>Top Miners</h3><div id="boardRows"></div></div>
  <div id="cargo" class="hud"></div>

  <div id="start">
    <div class="panel">
      <h1>NOVA&nbsp;100</h1>
      <div class="sub">MINE ASTEROIDS · COLLECT MATERIALS · TOP THE BOARD</div>
      <input id="name" maxlength="16" placeholder="Call sign" autocomplete="off" />
      <button id="play">LAUNCH</button>
      <div id="status"></div>
      <div class="controls">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> thrust &nbsp;·&nbsp;
        <kbd>Mouse</kbd> aim &nbsp;·&nbsp; <kbd>hold Click</kbd>/<kbd>Space</kbd> charge &amp; fire<br>
        shatter asteroids · fly over the materials to scoop them up
      </div>
      <div id="halloffame">
        <h3>★ All-Time Top Miners</h3>
        <ol id="hofRows"><li class="muted">Loading…</li></ol>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
