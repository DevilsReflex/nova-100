name: Deploy to Cloudflare

# Auto-deploys the Worker (+ Durable Objects + D1) to your Cloudflare account on
# every push to main. Requires one repo secret: CLOUDFLARE_API_TOKEN
# (Settings ▸ Secrets and variables ▸ Actions). See the README "Deploy" section.
# Until that secret is set this workflow fails on auth — that's expected.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Use the wrangler pinned in package.json (v4 reads wrangler.jsonc + the
      # `main` entry-point and supports D1/DO migrations), authenticating with
      # the repo's CLOUDFLARE_API_TOKEN secret.
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
